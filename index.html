<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Vault</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Personal Vault</h1>

        <p id="walletAddress">
            Wallet not connected
        </p>

        <button id="connectBtn">
            Connect Wallet
        </button>

        <div class="balanceBox">
            <span>USDC Balance</span>
            <h2 id="balance">0.00</h2>
        </div>

        <label>Network</label>

        <select id="network">

            <option value="base">
                Base
            </option>

            <option value="ethereum">
                Ethereum
            </option>

        </select>

        <label>Amount</label>

        <input
            id="amount"
            type="number"
            placeholder="0.00"
            min="0"
            step="0.01"
        >

        <button id="sendBtn">
            Transfer USDC
        </button>

        <div id="status"></div>

    </div>

</div>

<!-- Loading -->

<div id="loading" class="loading hidden">

    <div class="loader"></div>

    <p>Preparing transaction...</p>

</div>

<!-- Success Popup -->

<div id="popup" class="popup hidden">

    <div class="popupCard">

        <h2>✅ Success</h2>

        <p>
            USDC has been transferred.
        </p>

        <button id="closePopup">
            Close
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
